info:
  name: create cart
  type: http
  seq: 2

http:
  method: POST
  url: "{{host-veggo-api-gateway}}/api/v1/auth/cart"
  body:
    type: json
    data: |-
      {
        "product_id": 3,
        "quantity": 1
      }
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
